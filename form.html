<head>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="scripts/getdates.js" defer></script>
</head>
<body>

    <header>
        <h1>Product Review Form</h1>
    </header>

    <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="product">Product:</label>
        <input type="text" id="product" name="product" required>

        <p>Overall Rating</p>

<label>
  <input type="radio" name="rating" value="1">
  ★
</label><br>

<label>
  <input type="radio" name="rating" value="2">
  ★★
</label><br>

<label>
  <input type="radio" name="rating" value="3">
  ★★★
</label><br>

<label>
  <input type="radio" name="rating" value="4">
  ★★★★
</label><br>

<label>
  <input type="radio" name="rating" value="5">
  ★★★★★
</label>

        <p>Which features did you find useful in the product? (Check all that apply)</p>

        <label><input type="checkbox" name="features" value="durability"> Durability</label><br>
        <label><input type="checkbox" name="features" value="ease"> Ease of Use</label><br>
        <label><input type="checkbox" name="features" value="performance"> Performance</label><br>
        <label><input type="checkbox" name="features" value="design"> Design</label>
        <br><br>

        <label for="review">Review:</label>
        <textarea id="review" name="review" rows="4" required></textarea>

        <button type="submit">Submit Review</button>
    </form>

   <footer>
        <p>
        <span id="copyright">©</span> 
        <span id="year">2026</span>
         Xanen D. Gilbert __ Gilbert Arizona.
        </p>
        <p id="modified">Last modified 3 / 6 / 2026</p>
    </footer>
</body>
</html>
