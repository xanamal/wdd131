<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="This is a course about dynamic web fundamentals, and a insight to Xanen Gilbert a inspiring Web Developer.">

    <link rel="stylesheet" href="styles/form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="scripts/getdates.js" defer></script>
</head>
<body>

    <header>
        <h1>Product Review Form</h1>
    </header>

    <form class="review-form" action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="product">Product:</label>
        <input type="text" id="product" name="product" required>

         <p>Overall Rating</p>

        <input type="radio" id="rating1" name="rating" value="1" required>
        <label for="rating1">★</label>

        <input type="radio" id="rating2" name="rating" value="2" required>
        <label for="rating2">★★</label>

        <input type="radio" id="rating3" name="rating" value="3" required>
        <label for="rating3">★★★</label>

        <input type="radio" id="rating4" name="rating" value="4" required>
        <label for="rating4">★★★★</label>

        <input type="radio" id="rating5" name="rating" value="5" required>
        <label for="rating5">★★★★★</label>

        <br><br>

        <p>Which features did you find useful in the product? (Check all that apply)</p>

        <label><input type="checkbox" name="features" value="durability"> Durability</label><br>
        <label><input type="checkbox" name="features" value="ease"> Ease of Use</label><br>
        <label><input type="checkbox" name="features" value="performance"> Performance</label><br>
        <label><input type="checkbox" name="features" value="design"> Design</label>
        <br><br>

        <label class="review-label" for="review">Review:</label>
        <textarea id="review" name="review" rows="4" required></textarea>

        <button type="submit">Submit Review</button>
    </form>

   <footer>
        <p>
        <span id="copyright">©</span> 
        <span id="year">2026</span>
         Xanen D. Gilbert __ Gilbert Arizona.
        </p>
        <p id="modified">Last modified 3 / 6 / 2026</p>
    </footer>
</body>
</html>
